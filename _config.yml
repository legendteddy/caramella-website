title: Caramella Brunei
description: Premium Custom Cabinetry & Joinery in Brunei.
url: "https://caramellabrunei.com"
baseurl: ""

# Build settings
markdown: kramdown
theme: null # We are using a custom theme in _layouts

# Exclude these files from being processed
exclude:
  - README.md
  - node_modules
  - .gemini
  - brain
  - audit.js
  - audit_results.txt
  - pypdf_output.txt
  - pdf_parsed.txt
  - Elite Design Execution Partnership.md
  - SEO Strategy For Bruneian Cabinetry.pdf
  - .git
  - .github

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
