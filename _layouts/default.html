<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{ page.title }} | Caramella Brunei</title>
    <meta name="description" content="{{ page.description }}">
    <link rel="stylesheet" href="css/site.css?v=20260302">
    {% if page.extra_css %}
    <style>
        {
                {
                page.extra_css
            }

</html>
